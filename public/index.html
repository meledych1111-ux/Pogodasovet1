<!DOCTYPE html>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; padding: 12px; opacity: 0; pointer-events: none; transition: 0.3s; background: inherit; }
        .screen.active { opacity: 1; pointer-events: all; }
        .header { text-align: center; margin-bottom: 12px; padding: 6px; flex-shrink: 0; }
        .game-title { font-size: 1.8rem; font-weight: 900; background: linear-gradient(45deg, #ffd700, #ffa500, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px rgba(255,215,0,0.4); letter-spacing: 1px; }

        .menu-buttons { flex: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        .menu-btn { background: linear-gradient(145deg, #2a3f5e, #1a2a3a); border: none; border-radius: 20px; padding: 14px; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 4px 4px 10px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .menu-btn:active { transform: scale(0.95); background: #3a4a6a; }
        .game-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: rgba(20,30,80,0.7); border-radius: 18px; margin-bottom: 8px; border: 1px solid rgba(106,91,255,0.3); }
        .back-btn { background: #2a3f5e; border: none; color: white; padding: 6px 14px; border-radius: 25px; font-size: 0.85rem; cursor: pointer; }
        .info-box { background: rgba(10,20,50,0.9); padding: 4px 10px; border-radius: 25px; border: 1px solid #6a5bff; min-width: 60px; text-align: center; }
        .info-value { font-size: 0.85rem; font-weight: bold; color: #66ffaa; }
        .game-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; padding-left: 80px; }
        #tetris-canvas { background: rgba(0,0,0,0.3); border-radius: 16px; border: 2px solid #6a5bff; width: 220px; height: 440px; }
        #next-piece-left { position: absolute; left: 5px; top: 15%; width: 75px; display: flex; flex-direction: column; align-items: center; gap: 5px; background: rgba(20,30,80,0.95); border: 2px solid #ffd700; border-radius: 15px; padding: 10px 3px; z-index: 1000; }
        .next-piece-shape { width: 60px; min-height: 60px; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); border-radius: 6px; }
        .pet-block { width: 100%; text-align: center; border: 1px solid rgba(255,215,0,0.2); border-radius: 10px; padding: 5px; }
        .pet-block.ready { border-color: #ffd700; box-shadow: 0 0 10px #ffd700; }
        .pet-activate-btn { width: 100%; background: rgba(255,215,0,0.1); border: none; border-radius: 8px; color: #fff; padding: 5px; margin-top: 4px; cursor: pointer; font-size: 1.2rem; }
        .ready .pet-activate-btn { background: #ffd700; color: #000; animation: pulse 1.5s infinite; }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 8px; }
        .control-btn { background: #3a4a6a; border: none; border-radius: 22px; padding: 16px 8px; color: white; font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.6); }
        .control-btn:active { background: #6a5bff; transform: scale(0.9); }
        .boost-indicator { position: absolute; top: 5px; right: 5px; padding: 3px 6px; border-radius: 16px; font-size: 0.65rem; font-weight: bold; z-index: 1001; display: none; border: 1px solid #fff; }
        .progress-bar { height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #6a5bff, #00d2ff); width: 0%; transition: 0.3s; }
        .stats-container, .leaderboard-list { flex: 1; overflow-y: auto; padding: 10px; background: rgba(20,30,80,0.4); border-radius: 20px; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,20,60,0.98); color: white; padding: 15px 25px; border-radius: 20px; z-index: 10000; opacity: 0; transition: 0.3s; border: 2px solid #ffd700; pointer-events: none; }
        .notification.show { opacity: 1; }
        
        /* MODAL PIN */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 20000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #1a1f40; border: 2px solid #ffd700; border-radius: 24px; padding: 25px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 0 30px rgba(255,215,0,0.3); }
        .modal-pin-value { font-size: 2.5rem; font-weight: 900; color: #ffd700; margin: 15px 0; letter-spacing: 5px; }

        ];

        const PET_RANKS = [
            { prefix: '', name: 'Обычный', min: 0, max: 49, color: '#FFFFFF', mult: 1 },
            { prefix: '✨', name: 'Блестящий', min: 50, max: 99, color: '#FFD700', mult: 1.5 },
            { prefix: '🌟', name: 'Сияющий', min: 100, max: 149, color: '#FFFACD', mult: 2 },
            { prefix: '💎', name: 'Драгоценный', min: 150, max: 199, color: '#B9F2FF', mult: 2.5 },
            { prefix: '👑', name: 'Королевский', min: 200, max: 249, color: '#FFD700', mult: 3 },
            { prefix: '🔥', name: 'Легендарный', min: 250, max: 299, color: '#FF4500', mult: 4 },
            { prefix: '🎮', name: 'Мифический', min: 300, max: 349, color: '#9370DB', mult: 5 },
            { prefix: '♾️', name: 'Бесконечный', min: 350, max: Infinity, color: '#00FFFF', mult: 6 }
        ];

        function getPetByNumber(num) {
            if (num < 1) return null;
            const base = BASE_PETS[(num - 1) % 50];
            const tier = Math.floor((num - 1) / 50);
            const rank = PET_RANKS[Math.min(tier, PET_RANKS.length - 1)];
            return { ...base, rank, emoji: rank.prefix + base.emoji, boostedValue: base.value * rank.mult };
        }

        async function handleAuth() {
            const pin = document.getElementById('pin-field').value;
            if (pin.length < 5) return notify('Введите верный ПИН');
            await attemptAuth(pin);
        }

        async function attemptAuth(pin) {
            try {
                const r = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({pin}) });
                const d = await r.json();
                if (d.success) {
                    currentPin = pin; localStorage.setItem('user_pin', pin);
                    anonymousName = d.login; document.getElementById('user-display').textContent = anonymousName;
                    document.getElementById('display-pin').textContent = pin;
                    showScreen('menu'); 
                    if (!localStorage.getItem('pin_confirmed')) { openPinModal(); }
                } else { notify('Неверный ПИН'); }
            } catch(e) { notify('Ошибка связи'); }
        }

        async function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const pinFromUrl = urlParams.get('pin');
            if (pinFromUrl) { currentPin = pinFromUrl; localStorage.setItem('user_pin', currentPin); }
            if (currentPin) { await attemptAuth(currentPin); } else { showScreen('auth'); }
        }

        function openPinModal() { document.getElementById('display-pin').textContent = currentPin; document.getElementById('pin-modal').classList.add('active'); }
        function closePinModal() { localStorage.setItem('pin_confirmed', 'true'); document.getElementById('pin-modal').classList.remove('active'); }
        function logout() { localStorage.removeItem('user_pin'); localStorage.removeItem('pin_confirmed'); location.reload(); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id+'-screen').classList.add('active'); }
        function notify(m) { const n = document.getElementById('notification'); n.textContent = m; n.classList.add('show'); setTimeout(()=>n.classList.remove('show'), 3000); }

        function startNewGame() {
            board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
            score = 0; lines = 0; gameLevel = 0; petFoodData = {};
            gameActive = true; paused = false; dropInterval = 800;
            slowActive = false; magnetActive = false;
            nextPiece = createPiece(); spawn(); updateUI(); showScreen('game');
            lastTime = performance.now(); requestAnimationFrame(loop);
        }

        function createPiece() { const i = Math.floor(Math.random()*SHAPES.length); return {shape:SHAPES[i], color:COLORS[i]}; }
        function spawn() { curPiece = nextPiece; nextPiece = createPiece(); curX = 3; curY = 0; if(collide(0,0)) { gameActive = false; saveGameToDB(true); notify('🎯 ГЕЙМ ОВЕР!'); setTimeout(showMenu, 2000); } drawNext(); }
        function collide(dx, dy, s = curPiece.shape) { for(let y=0; y<s.length; y++) for(let x=0; x<s[y].length; x++) if(s[y][x]) { let nx=curX+x+dx, ny=curY+y+dy; if(nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&board[ny][nx])) return true; } return false; }
        
        function checkLines() {
            let cleared = 0;
            for(let y=ROWS-1; y>=0; y--) if(board[y].every(c => c)) { board.splice(y,1); board.unshift(Array(COLS).fill(0)); cleared++; y++; }
            if(cleared) {
                score += [0, 40, 100, 300, 1200][cleared] * (gameLevel + 1); lines += cleared;
                const pet = getPetByNumber(gameLevel + 1);
                if(pet) petFoodData[pet.id] = (petFoodData[pet.id] || 0) + cleared;
                gameLevel = Math.floor(score/500);
                dropInterval = Math.max(100, Math.round(800 / (1 + gameLevel * 0.12)));
                updateUI();
            }
        }

        function loop(t) {
            if(!gameActive || paused) { lastTime = t; if(gameActive) requestAnimationFrame(loop); return; }
            const dt = t - lastTime; lastTime = t; dropCounter += dt;
            if(magnetActive && Math.random() < 0.1) { if(!collide(-1,0)) curX--; else if(!collide(1,0)) curX++; }
            if(dropCounter > (slowActive ? 1500 : dropInterval)) { if(!collide(0,1)) curY++; else { curPiece.shape.forEach((r,y)=>r.forEach((v,x)=>{if(v)board[curY+y][curX+x]=curPiece.color;})); checkLines(); spawn(); } dropCounter = 0; }
            draw(); requestAnimationFrame(loop);
        }

        const ctx = document.getElementById('tetris-canvas').getContext('2d');
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,220,440);
            ctx.strokeStyle = 'rgba(106,91,255,0.1)'; 
            for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*SIZE,0); ctx.lineTo(x*SIZE,440); ctx.stroke(); }
            for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*SIZE); ctx.lineTo(220,y*SIZE); ctx.stroke(); }
            board.forEach((r,y)=>r.forEach((c,x)=>{if(c){ctx.fillStyle=c; ctx.fillRect(x*SIZE,y*SIZE,SIZE-1,SIZE-1);}}));
            if(curPiece) curPiece.shape.forEach((r,y)=>r.forEach((v,x)=>{if(v){ctx.fillStyle=curPiece.color; ctx.fillRect((curX+x)*SIZE,(curY+y)*SIZE,SIZE-1,SIZE-1);}}));
        }

        function drawNext() {
            const p = document.getElementById('next-piece-left-shape'); p.innerHTML = '';
            const g = document.createElement('div'); g.style.display='grid'; g.style.gridTemplateColumns=`repeat(${nextPiece.shape[0].length}, 8px)`; g.style.gap='1px';
            nextPiece.shape.forEach(r => r.forEach(v => { const d = document.createElement('div'); d.style.width='8px'; d.style.height='8px'; if(v) d.style.background = nextPiece.color; g.appendChild(d); }));
            p.appendChild(g);
        }

        function updateUI() {
            document.getElementById('score-display').textContent = score;
            document.getElementById('level-display').textContent = gameLevel;
            document.getElementById('progress-fill').style.width = (score % 500 / 5) + '%';
            const pet = getPetByNumber(gameLevel + 1);
            if(pet) { 
                const food = petFoodData[pet.id] || 0;
                document.getElementById('pet-emoji').textContent = pet.emoji; 
                document.getElementById('pet-food-count-display').textContent = food + '/' + pet.foodCost; 
                document.getElementById('pet-ui').className = food >= pet.foodCost ? 'pet-block ready' : 'pet-block'; 
            }
        }

        function usePetAbility() {
            const pet = getPetByNumber(gameLevel + 1);
            if(!pet || (petFoodData[pet.id] || 0) < pet.foodCost) return; petFoodData[pet.id] -= pet.foodCost;
            if(pet.type === 'clear') { for(let i=0;i<pet.boostedValue;i++){board.pop(); board.unshift(Array(COLS).fill(0));} notify('🧹 Очистка!'); }
            else if(pet.type === 'slow') { slowActive = true; document.getElementById('slow-indicator').style.display='flex'; setTimeout(()=>{slowActive=false; document.getElementById('slow-indicator').style.display='none';}, pet.boostedValue); notify('⏰ Замедление!'); }
            else if(pet.type === 'magnet') { magnetActive = true; document.getElementById('magnet-indicator').style.display='flex'; setTimeout(()=>{magnetActive=false; document.getElementById('magnet-indicator').style.display='none';}, 10000); notify('🧲 Магнит!'); }
            updateUI(); draw();
        }

        function togglePause() { paused = !paused; document.getElementById('pause-btn').textContent = paused ? '▶ ПУСК' : '⏸ ПАУЗА'; }
        function showMenu() { gameActive = false; showScreen('menu'); }

        async function saveGameToDB(gameOver = false) {
            try { await fetch('/api/save-score', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pin: currentPin, score, level: gameLevel, lines, gameType:'tetris'}) }); } catch(e){}
        }

        async function showStats() {
            const cont = document.getElementById('stats-container'); cont.innerHTML = 'Загрузка...'; showScreen('stats');
            try {
                const r = await fetch(`/api/user-stats?pin=${currentPin}`);
                const d = await r.json(); const best = d.best_score || 0; const petCount = Math.floor(best / 500);
                cont.innerHTML = `<div class="stat-card"><div class="stat-row"><span>🏆 Рекорд:</span><b>${best}</b></div><div class="stat-row"><span>🎮 Игр:</span><b>${d.games_played}</b></div></div><h3 style="color:#ffd700;">🐾 КОЛЛЕКЦИЯ (${Math.min(50, petCount)}/50)</h3><div style="display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:10px;">${Array.from({length: Math.min(50, petCount)}).map((_,i)=>{const p=getPetByNumber(i+1); return `<div style="font-size:1.5rem; background:rgba(0,0,0,0.3); border-radius:10px; text-align:center; padding:5px;">${p.emoji}</div>`;}).join('')}</div>`;
            } catch(e){ cont.innerHTML = 'Ошибка'; }
        }

        async function showLeaderboard() {
            const list = document.getElementById('leaderboard-list'); list.innerHTML = 'Загрузка...'; showScreen('leaderboard');
            try {
                const r = await fetch('/api/top-players?gameType=tetris'); const d = await r.json();
                list.innerHTML = d.players.map(p => {
                    const maxPets = Math.floor(p.score / 500); let petsHtml = '';
                    for (let j=0; j<Math.min(5, maxPets); j++){ const pt=getPetByNumber(j+1); petsHtml += `<span>${pt.emoji}</span>`; }
                    return `<div class="leaderboard-item"><div style="width:25px; font-weight:bold; color:#ffd700;">#${p.rank}</div><div style="flex:1;"><div>${p.username}</div><div style="display:flex; gap:2px; font-size:0.8rem;">${petsHtml}${maxPets>5?'+'+(maxPets-5):''}</div></div><div style="text-align:right;"><b>${p.score}</b></div></div>`;
                }).join('');
            } catch(e){ list.innerHTML = 'Ошибка загрузки'; }
        }

        let mInt, mWait;
        function startMove(dir) { if(paused || !gameActive) return; const f = () => { if(dir==='left'&&!collide(-1,0)) curX--; if(dir==='right'&&!collide(1,0)) curX++; if(dir==='down'&&!collide(0,1)) curY++; draw(); }; f(); mWait = setTimeout(() => { mInt = setInterval(f, 50); }, 120); }
        function stopMove() { clearTimeout(mWait); clearInterval(mInt); }
        
        document.getElementById('btn-left').ontouchstart = (e) => { e.preventDefault(); startMove('left'); };
        document.getElementById('btn-right').ontouchstart = (e) => { e.preventDefault(); startMove('right'); };
        document.getElementById('btn-down').ontouchstart = (e) => { e.preventDefault(); startMove('down'); };
        document.getElementById('btn-rotate').ontouchstart = (e) => { e.preventDefault(); if(paused || !gameActive) return; const r = curPiece.shape[0].map((_,i) => curPiece.shape.map(row => row[i]).reverse()); if(!collide(0,0,r)) curPiece.shape = r; draw(); };
        document.getElementById('btn-left').ontouchend = stopMove;
        document.getElementById('btn-right').ontouchend = stopMove;
        document.getElementById('btn-down').ontouchend = stopMove;

        initApp();
    </script>
</body>
</html>
